id: "example-repo-2026-07-06-task-001"
version: "0.1.0"
status: "draft" # draft | accepted | retired | invalid

suite:
  id: "agent-config-regression-suite"
  root: "<pi-config-dir>/benchmarks/suites/agent-config-regression-suite"
  task_root: "tasks/example-repo-2026-07-06-task-001"
  path_policy: "paths are relative to suite.root unless prefixed with suite:, task:, benchmarking:, session:, host_local:, or external:"

source:
  type: "issue_pr" # issue_pr | commit_rollback | ci_fail_pass | mutation | backlog | review_only | adversarial
  repo: "owner/repo"
  base_commit: "<commit-sha-or-image-digest>"
  source_issue: null
  source_pr: null
  source_commit: null
  provenance_notes: "How this task was derived without leaking the solution."

visibility:
  public_artifacts:
    - "task:public/task.md"
    - "task:public/setup-notes.md"
  private_artifacts:
    - "task:private/evaluator-brief.md"
    - "task:private/reference-outcome.md"
    - "task:private/per_task_rubric_supplement.json"
    - "task:private/anti-solutions.md"
  private_artifacts_not_for_candidate_review:
    - "task:private/gold.patch"
    - "task:private/task-origin.md"
    - "task:private/generation-rationale.md"
  reviewer_exposure_policy:
    normal_reviewer:
      - "task:public/task.md"
      - "reviewer-visible evaluator excerpt"
      - "blinded candidate artifacts"
      - "task-specific outcome rubric"
    elevated_reviewer:
      - "bounded process excerpts if process review is requested"
    audit_only:
      - "task:private/gold.patch"
      - "task:private/task-origin.md"
      - "task:private/generation-rationale.md"
      - "raw transcripts or host-local recovery refs"
    reducer:
      - "reviewer JSON outputs"
      - "rubric and prompt versions"
      - "packet ids and blinded labels"
      - "agreement/adjudication metrics"

environment:
  base_state: "repo checkout, container image, or sandbox description"
  setup_command: null
  public_check_command: null
  candidate_workspace_policy: "workspace contains only candidate-facing files; candidate must not inspect parent directories, private artifacts, task manifests, evaluator briefs, or repo-level status outside the workspace"
  allowed_edit_globs:
    - "src/**/*.py"
  readonly_artifacts:
    - "tests/**"
    - "public/**"
    - "private/**"
    - "task-manifest.yaml"
    - "run-manifest.yaml"
    - "reports/**"
  generated_artifact_policy: "avoid generated artifacts in candidate workspaces where practical; record cleanup separately from source/test diffs"
  network: "disabled" # disabled | allowlist | unrestricted
  allowed_tools: []
  budget:
    wall_time_minutes: 60
    max_turns: null
    max_tool_calls: null

scoring:
  primary_mode: "review_only"
  primary_metric: "adjudicated_llm_judge_pr_quality"
  review:
    rubric_version: "pr-quality-llm-judge-v2"
    general_rubric: "benchmarking:references/pr-quality-llm-judge-rubric.md"
    task_supplement: "task:private/per_task_rubric_supplement.json"
    reviewer_prompt_version: "candidate-gold-reference-judge-prompt-v2"
    task_curator_prompt_version: "curation-review-prompt-v1"
    candidate_review_mode: "gold_reference_single_output" # blinded_pairwise | single_output | gold_reference_single_output | audit
    judge_packet_template: "benchmarking:templates/candidate-judge-packet.json"
    output_template: "benchmarking:templates/candidate-output-review.json"
    topology_profile: "quality_gate_3" # single_review | quality_gate_3 | matrix_10 | panel_20 | custom
    reviewer_topology_reference: "benchmarking:references/reviewer-topology.md"
    review_lanes:
      - review_stage: "leaf_review"
        review_role: "pr_quality_correctness"
        focus_surface: "output"
        allowed_evidence_scope: "gold_reference_judge"
      - review_stage: "leaf_review"
        review_role: "maintainability_integration"
        focus_surface: "output"
        allowed_evidence_scope: "gold_reference_judge"
      - review_stage: "leaf_review"
        review_role: "verification_safety_pr_readiness"
        focus_surface: "output"
        allowed_evidence_scope: "gold_reference_judge"
    reducer_required: true
    reducer_template: "benchmarking:templates/candidate-review-adjudication.json"
    second_wave_policy: "targeted_named_gaps_only"
    order_swap_required: false
    gold_reference:
      allowed_for_candidate: false
      allowed_for_judge: true
      include_raw_gold_in_public_report: false
      source: "source.base_commit/source.source_commit or task:private/task-origin.md"
    require_neither_acceptable_option: true
    fairness_policy:
      judge_gold_as_intent_reference_not_patch_shape: true
      accept_clean_equivalent_implementations: true
      require_task_rubric_sufficiency_classification: true
      require_expectation_source_on_rejection_findings: true
      expectation_source_categories:
        - "public_task_stated"
        - "task_specific_outcome_rubric"
        - "repo_discoverable"
        - "gold_reference_intent"
        - "not_applicable"
      reject_shape_biased_counted_findings: true
    secondary_score_0_to_10:
      enabled: false
      anchor_reference: "benchmarking:references/pr-quality-llm-judge-rubric.md#optional-anchored-0-10-secondary-score"
      aggregation: "median/range only; do not average raw scores"

labeling:
  applicable: false
  label_set_version: null
  evaluation_unit: "finding" # task | candidate | finding
  ground_truth_labels: []
  required_labels: []
  abstain_label: "unknown"

observed_metrics_policy:
  resource_metrics_are_constraints: false
  collect_wall_clock_ms: true
  collect_active_runtime_ms: "if_available"
  collect_tool_calls_by_tool: true
  collect_subagent_count_by_role: true
  collect_token_counts: "if_available"
  collect_estimated_cost: "if_available"

run_metadata_requirements:
  capture_config_hash: true
  capture_model_id: true
  capture_agent_version: true
  capture_prompt_version: true
  capture_tool_versions: true
  capture_transcript_path: true
  capture_patch_path: true
  capture_final_answer_path: true
  capture_test_log_paths: "if_available"
  capture_observed_metrics: true
  capture_runner_mode: true
  capture_replay_refs: true

blinding:
  required_for_pairwise_review: true
  anonymized_labels:
    - "X"
    - "Y"
  assignment_record_path: "task:private/blinding/xy-assignment.json"
  anonymization_map_path: "task:private/blinding/anonymization-map.json"
  assignment_seed: null
  hide_candidate_identities_from_normal_review: true

mechanics:
  manifest_schema_checked: false
  public_private_split_checked: false
  leakage_check_completed: false
  candidate_anonymization_required: true
  xy_randomization_record_required: true
  artifact_paths_required: true
  candidate_provenance_required: true
  config_model_prompt_versions_required: true
  rubric_and_reviewer_prompt_versions_required: true
  accepted_packet_immutable_after_candidate_exposure: true
  candidate_workspace_isolation_checked: false
  public_task_declares_allowed_edits: false
  public_tests_declared_readonly: false
  concurrent_candidate_workspaces_isolated: false
  candidate_task_edits_recorded_as_process_evidence: true
  code_result_and_process_result_reported_separately: true

metadata:
  task_type: "bugfix" # bugfix | feature | refactor | migration | ci_debug | test_quality | review_only | safety | restraint | tool_use | docs_api
  difficulty: "medium" # smoke | medium | hard | long_horizon
  expected_human_time: "15m-1h"
  domains: []
  risks: []
  tags: []
  contamination_status: "private" # private | public | known_contaminated | unknown

maintenance:
  created_by: "<curator-or-agent-id>"
  created_at: "2026-07-06"
  validated_at: null
  retired_at: null
  notes: ""
